# Squid proxy config for sandbox network filtering
# Filters outbound HTTP/HTTPS traffic against a domain whitelist

# Listen on port 3128
http_port 3128

# Load allowed domains from mounted whitelist file
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# Allow CONNECT (HTTPS tunneling) to allowed domains on standard ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 8080
acl Safe_ports port 8443
acl CONNECT method CONNECT

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow traffic to whitelisted domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Logging to stdout (captured by docker logs)
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Minimal cache (we're filtering, not caching)
cache deny all

# Don't add forwarded-for headers (privacy)
forwarded_for delete
via off

# Suppress squid version in error pages
httpd_suppress_version_string on

# PID file location writable by squid user
pid_filename /var/run/squid/squid.pid
