# Provider metadata — read by the sandbox launcher
# All fields are required unless marked optional

# Unique provider name (matches directory name)
name=claude-code

# Human-readable description
description=Anthropic Claude Code CLI

# Comma-separated list of required environment variables
# The launcher will error if these are not set in .sandbox.env or environment
# Note: ANTHROPIC_API_KEY is optional — Claude Code can authenticate via
# session credentials (~/.claude/.credentials.json) seeded from the host.
required_env=

# Default image profile to use (base, java, node, fullstack)
# Optional — defaults to "base" if not specified
default_image=base
